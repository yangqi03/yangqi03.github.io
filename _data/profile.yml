short_bio: >-
  <p>
    Hi! I'm Yang Qi, a recent M.Sc. graduate in Artificial Intelligence from Nanyang Technological University. Prior to NTU, I completed my Bachelor's degree in Software Engineering at Beihang University, with an exchange semester at the University of Macau along the way.
  </p>
  <p>
    I'm passionate about making LLMs more reliable. At Huawei Singapore Research Centre, I designed and shipped an LLM-based fact verification system using a two-stage SFT and reinforcement learning pipeline, and co-authored a paper on tree-based fact-checking strategies that was published on arXiv. My broader experience spans LLM fine-tuning, RAG systems, multi-agent architectures, and full-stack development across Python, Java, JavaScript, AWS, and Docker.
  </p>
  <p>
    I'm currently looking for full-time roles in AI/Machine Learning/Software engineering. If you think it's a fit, I'd love to connect!
  </p>

